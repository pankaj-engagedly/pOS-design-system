<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>pOS Icon Generator</title>
  <style>
    body { font-family: Inter, sans-serif; padding: 2rem; background: #f5f5f5; }
    h1 { margin-bottom: 1rem; }
    .row { display: flex; gap: 2rem; align-items: flex-start; flex-wrap: wrap; }
    .icon-box { text-align: center; }
    canvas { border: 1px solid #ccc; border-radius: 8px; }
    button { margin-top: 0.5rem; padding: 0.5rem 1rem; cursor: pointer; border: none; background: #2563eb; color: #fff; border-radius: 4px; }
    p { margin-top: 0.25rem; color: #666; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>pOS PWA Icon Generator</h1>
  <p>Click each button to download the PNG. Place them in <code>frontend/shell/icons/</code>.</p>
  <div class="row">
    <div class="icon-box">
      <canvas id="c192" width="192" height="192"></canvas>
      <br><button onclick="download('c192','icon-192.png')">Save 192x192</button>
      <p>icon-192.png</p>
    </div>
    <div class="icon-box">
      <canvas id="c512" width="512" height="512"></canvas>
      <br><button onclick="download('c512','icon-512.png')">Save 512x512</button>
      <p>icon-512.png</p>
    </div>
    <div class="icon-box">
      <canvas id="c512m" width="512" height="512"></canvas>
      <br><button onclick="download('c512m','icon-512-maskable.png')">Save 512x512 Maskable</button>
      <p>icon-512-maskable.png (extra padding for safe zone)</p>
    </div>
  </div>
  <script>
    function drawIcon(canvasId, size, maskable) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const r = size * 0.15;

      // Background
      ctx.fillStyle = '#2563eb';
      if (maskable) {
        ctx.fillRect(0, 0, size, size);
      } else {
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.fill();
      }

      // Text
      const fontSize = maskable ? size * 0.28 : size * 0.36;
      ctx.fillStyle = '#ffffff';
      ctx.font = `700 ${fontSize}px Inter, system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('pOS', size / 2, size / 2 + fontSize * 0.03);
    }

    drawIcon('c192', 192, false);
    drawIcon('c512', 512, false);
    drawIcon('c512m', 512, true);

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
