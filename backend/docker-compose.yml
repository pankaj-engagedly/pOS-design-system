services:
  # PostgreSQL: Using local Homebrew installation (postgresql@17)
  # If you need Docker Postgres instead, uncomment below and change port to 5433
  # postgres:
  #   image: postgres:16
  #   container_name: pos-postgres
  #   environment:
  #     POSTGRES_USER: pos
  #     POSTGRES_PASSWORD: pos
  #     POSTGRES_DB: pos
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - pos-pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - pos-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  pos-rabbitmq-data:
